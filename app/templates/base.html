<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digital Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .ds-badge-open { background-color: #198754; }
        .ds-badge-closed { background-color: #dc3545; }
        .ds-card { transition: transform 0.2s, box-shadow 0.2s; }
        .ds-card:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .ds-price { color: #198754; font-weight: 700; font-size: 1.25rem; }
        .toast-container { z-index: 9999; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shop"></i> Digital Shop
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house"></i> Browse Shops</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>&copy; 2025 Digital Shop Platform</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <!-- Toast notification container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="ds-toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="ds-toast-title">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="ds-toast-body"></div>
        </div>
    </div>

    <script>
        function showToast(title, message, type = 'success') {
            const toastEl = document.getElementById('ds-toast');
            const toastTitle = document.getElementById('ds-toast-title');
            const toastBody = document.getElementById('ds-toast-body');
            toastTitle.textContent = title;
            toastBody.textContent = message;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('text-bg-danger');
            else if (type === 'success') toastEl.classList.add('text-bg-success');
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
