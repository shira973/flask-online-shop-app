{% extends "base.html" %}

{% block title %}{{ seller.business_name }} — Seller Dashboard{% endblock %}

{% block content %}
<div x-data="sellerHome()" class="py-3">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1" x-text="'Manage: ' + businessName"></h1>
            <span class="badge fs-6"
                  :class="seller.is_open ? 'ds-badge-open' : 'ds-badge-closed'"
                  x-text="seller.is_open ? '🟢 Open' : '🔴 Closed'">
            </span>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editBusinessModal">
                <i class="bi bi-pencil"></i> Edit Business Name
            </button>
            <button class="btn" :class="seller.is_open ? 'btn-danger' : 'btn-success'" @click="toggleShop()">
                <i class="bi" :class="seller.is_open ? 'bi-shop' : 'bi-shop-window'"></i>
                <span x-text="seller.is_open ? 'Close Shop' : 'Open Shop'"></span>
            </button>
        </div>
    </div>

    <!-- Add New Item Card -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
            <i class="bi bi-plus-circle"></i> Add New Item
        </div>
        <div class="card-body">
            <form @submit.prevent="addItem()">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Item Name *</label>
                        <input type="text" class="form-control" x-model="newItem.name" required placeholder="Item name">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Description</label>
                        <input type="text" class="form-control" x-model="newItem.description" placeholder="Description">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Price *</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" x-model="newItem.price" required placeholder="0.00">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Contact Details</label>
                        <input type="text" class="form-control" x-model="newItem.contact_details" placeholder="Phone/Email">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-lg"></i> Add Item
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Items Grid -->
    <h3 class="mb-3">Your Items <span class="badge bg-secondary" x-text="items.length"></span></h3>

    <template x-if="items.length === 0">
        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i> No items yet. Add your first item above!
        </div>
    </template>

    <div class="row g-4">
        <template x-for="item in items" :key="item.id">
            <div class="col-md-6 col-lg-4">
                <div class="card ds-card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" x-text="item.name"></h5>
                        <p class="card-text text-muted" x-text="item.description || 'No description'"></p>
                        <p class="ds-price mb-0">$ <span x-text="parseFloat(item.price).toFixed(2)"></span></p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <a :href="'/seller/{{ seller.id }}/items/' + item.id" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>

<!-- Edit Business Name Modal -->
<div class="modal fade" id="editBusinessModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-shop"></i> Edit Business Name</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Business Name</label>
                    <input type="text" class="form-control" x-model="editName" id="editNameInput">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contact Details</label>
                    <input type="text" class="form-control" x-model="editContact" id="editContactInput">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" @click="updateBusiness()">
                    <i class="bi bi-check-lg"></i> Save Changes
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function sellerHome() {
    return {
        seller: {{ seller | tojson }},
        items: {{ items | tojson }},
        businessName: {{ seller.business_name | tojson }},
        editName: {{ seller.business_name | tojson }},
        editContact: {{ (seller.contact_details or '') | tojson }},
        newItem: { name: '', description: '', price: '', contact_details: '' },

        async toggleShop() {
            const res = await fetch('/api/seller/toggle-shop', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seller_id: this.seller.id })
            });
            const data = await res.json();
            if (data.success) {
                this.seller = data.data;
                showToast('Shop Status', data.message);
            } else {
                showToast('Error', data.message, 'error');
            }
        },

        async addItem() {
            const res = await fetch('/api/seller/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    seller_id: this.seller.id,
                    ...this.newItem
                })
            });
            const data = await res.json();
            if (data.success) {
                this.items.push(data.data);
                this.newItem = { name: '', description: '', price: '', contact_details: '' };
                showToast('Item Added', data.message);
            } else {
                showToast('Error', data.message, 'error');
            }
        },

        async updateBusiness() {
            const res = await fetch('/api/seller/business', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    seller_id: this.seller.id,
                    business_name: this.editName,
                    contact_details: this.editContact
                })
            });
            const data = await res.json();
            if (data.success) {
                this.seller = data.data;
                this.businessName = data.data.business_name;
                bootstrap.Modal.getInstance(document.getElementById('editBusinessModal')).hide();
                showToast('Business Updated', data.message);
            } else {
                showToast('Error', data.message, 'error');
            }
        }
    }
}
</script>
{% endblock %}
